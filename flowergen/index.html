<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flower Generator</title>
  <script src="https://esm.sh/css-doodle@0.40.8/css-doodle.min.js?raw"></script>
</head>

<style>
  css-doodle {
    --rule: ( :doodle {
        @grid: 200x1 / 70vmin 100vmin;
        overflow: visible;
        contain: initial;
        --color-1: black;
        --color-2: @P;
        --color-3: @P;
        --color-4: @P;
        --color-5: @P;
        --color-6: @P;
        background-image: @svg(viewBox: 0 0 1000 1000;

          circle*400 {
            cx: @r(20, 980);
            cy: @r(20, 980);
            r: @r(.01, 3);
            fill: black;
            animation: pulse 2s infinite;
          }

        );

        filter: @svg-filter(feTurbulence {
            type: fractalNoise;
            baseFrequency: 0.8;
          }

          feDisplacementMap {
            in: SourceGraphic;
            scale: 1.5;
          }

        );
      }

      position: absolute;

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 0.5;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
      }
    )
  }

  html,
  body {
    height: 100%;
    margin: 0;
    background: black;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  graph {
    position: relative;
    width: 70vmin;
    height: 100vmin;
    background: transparent;
    animation: fadeIn 1s ease forwards;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }
</style>

<body>
  <graph>
    <css-doodle use="var(--rule)" click-to-update></css-doodle>
  </graph>

  <script>
    let currentBackgroundIndex = 0;
    let currentPaletteIndex = 0;

    const pastelColors = [
      '#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff',
      '#ffc3a0', '#ff677d', '#d4a5a5', '#ffb3e0', '#c3b1e0'
    ];

    const colorPalettes = [
      ['#e9dbce', '#fceade', '#ea526f', '#e2c290', '#6b2d5c', '#25ced1', '#b3908c', '#f7d5cb'],
      ['#c9cba3', '#ffe1a8', '#e26d5c', '#723d46', '#472d30', '#bcd29f', '#ffd19d', '#d46958']
    ];

    function updateDoodleAndBackground() {
      const doodle = document.querySelector('css-doodle');
      const selectedColors = colorPalettes[currentPaletteIndex];

      // Update CSS custom properties for colors
      selectedColors.forEach((color, index) => {
        doodle.style.setProperty(`--color-${index + 1}`, color);
      });

      doodle.style.backgroundColor = pastelColors[currentBackgroundIndex];
      doodle.update();

      // Update URL with all color and petal details
      const newUrl = new URL(window.location.href);
      newUrl.searchParams.set('backgroundColor', pastelColors[currentBackgroundIndex]);
      selectedColors.forEach((color, index) => {
        newUrl.searchParams.set(`flowerColor${index + 1}`, color);
      });

      // Petal parameters
      const petalDetails = [
        { size: 10, placeX: 50, placeY: 60, rotation: 20 },
        { size: 15, placeX: 30, placeY: 70, rotation: -20 }
      ];
      petalDetails.forEach((petal, index) => {
        newUrl.searchParams.set(`petal${index + 1}Size`, petal.size);
        newUrl.searchParams.set(`petal${index + 1}PlaceX`, petal.placeX);
        newUrl.searchParams.set(`petal${index + 1}PlaceY`, petal.placeY);
        newUrl.searchParams.set(`petal${index + 1}Rotation`, petal.rotation);
      });

      window.history.replaceState(null, '', newUrl.toString());

      // Increment indices
      currentBackgroundIndex = (currentBackgroundIndex + 1) % pastelColors.length;
      currentPaletteIndex = (currentPaletteIndex + 1) % colorPalettes.length;
    }

    function handleMouseMove() {
      updateDoodleAndBackground();
    }

    document.addEventListener('mousemove', handleMouseMove);

    // Load state from URL on page load
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const backgroundColorFromUrl = urlParams.get('backgroundColor');
      if (backgroundColorFromUrl) {
        document.querySelector('css-doodle').style.backgroundColor = backgroundColorFromUrl;
      }
      for (let i = 1; i <= 8; i++) {
        const color = urlParams.get(`flowerColor${i}`);
        if (color) {
          document.querySelector('css-doodle').style.setProperty(`--color-${i}`, color);
        }
      }
      // Load petal properties
      for (let i = 1; i <= 2; i++) {
        const size = urlParams.get(`petal${i}Size`);
        const placeX = urlParams.get(`petal${i}PlaceX`);
        const placeY = urlParams.get(`petal${i}PlaceY`);
        const rotation = urlParams.get(`petal${i}Rotation`);
        // Apply petal properties if they exist in URL
        if (size && placeX && placeY && rotation) {
          const petalStyle = `@size: ${size}vmin; @place: ${placeX}% ${placeY}%; transform: rotate(${rotation}deg);`;
          document.querySelector('css-doodle').innerHTML += `:doodle { ${petalStyle} }`;
        }
      }
    });
  </script>
</body>

</html>
