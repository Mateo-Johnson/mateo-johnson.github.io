<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List | Mateo Johnson</title>
    <style>
        :root {
            --highlight: #0e7be2;
            --bg-dark: #1a1a1a;
            --bg-lighter: #252525;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 700;
            background: linear-gradient(135deg, var(--highlight), #64b5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input, button {
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
        }

        input {
            flex: 1;
            background: var(--bg-lighter);
            color: var(--text);
            transition: all 0.3s ease;
        }

        input:focus {
            outline: 2px solid var(--highlight);
            box-shadow: 0 0 15px rgba(14, 123, 226, 0.3);
        }

        button {
            background: var(--highlight);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(14, 123, 226, 0.4);
        }

        .filters {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .todo-item {
            background: var(--bg-lighter);
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            animation: slideIn 0.3s ease;
            transition: all 0.3s ease;
        }

        .todo-item .todo-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--highlight);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .checkbox.checked {
            background: var(--highlight);
        }

        .checkbox.checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
        }

        .todo-text {
            flex: 1;
        }

        .delete-btn, .add-subtask-btn {
            background: transparent;
            color: #ff4444;
            border: 2px solid #ff4444;
            padding: 0.5rem 1rem;
        }

        .delete-btn:hover {
            background: #ff4444;
            color: white;
        }

        .add-subtask-btn {
            color: var(--highlight);
            border-color: var(--highlight);
        }

        .add-subtask-btn:hover {
            background: var(--highlight);
            color: white;
        }

        .subtasks {
            margin-left: 2rem;
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .subtask-item {
            background: var(--bg-lighter);
            padding: 0.75rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }

        .subtask-item.completed {
            opacity: 0.6;
        }

        .subtask-item.completed .todo-text {
            text-decoration: line-through;
        }

        .subtask-input {
            margin-left: 2rem;
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>

        <div class="filters">
            <button onclick="todoApp.setFilter('all')">All</button>
            <button onclick="todoApp.setFilter('active')">Active</button>
            <button onclick="todoApp.setFilter('completed')">Completed</button>
        </div>

        <div class="input-container">
            <input type="text" id="todoInput" placeholder="Add a new task..." autofocus>
            <button id="addBtn">Add Task</button>
        </div>

        <div class="todo-list" id="todoList">
            <div class="empty-state">No tasks yet. Add one above!</div>
        </div>
    </div>

    <script>
        class TodoApp {
            constructor() {
                this.todos = JSON.parse(localStorage.getItem('todos')) || [];
                this.filter = 'all';
                this.setupElements();
                this.setupEventListeners();
                this.render();
            }

            setupElements() {
                this.todoInput = document.getElementById('todoInput');
                this.addBtn = document.getElementById('addBtn');
                this.todoList = document.getElementById('todoList');
            }

            setupEventListeners() {
                this.addBtn.addEventListener('click', () => this.addTodo());
                this.todoInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTodo();
                });
            }

            addTodo() {
                const text = this.todoInput.value.trim();
                if (text) {
                    this.todos.push({
                        id: Date.now(),
                        text,
                        completed: false,
                        subtasks: [],
                        showSubtasks: false
                    });
                    this.todoInput.value = '';
                    this.save();
                    this.render();
                }
            }

            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    this.save();
                    this.render();
                }
            }

            toggleSubtaskVisibility(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.showSubtasks = !todo.showSubtasks;
                    this.render();
                }
            }

            deleteTodo(id) {
                this.todos = this.todos.filter(t => t.id !== id);
                this.save();
                this.render();
            }

            addSubtask(parentId) {
                const parentTask = this.todos.find(t => t.id === parentId);
                const inputDiv = document.getElementById(`subtaskInput-${parentId}`);
                const input = inputDiv.querySelector('input');
                const text = input.value.trim();
                if (text) {
                    parentTask.subtasks.push({
                        id: Date.now(),
                        text,
                        completed: false
                    });
                    input.value = '';
                    this.save();
                    this.render();
                }
            }

            toggleSubtask(parentId, subtaskId) {
                const parentTask = this.todos.find(t => t.id === parentId);
                const subtask = parentTask.subtasks.find(s => s.id === subtaskId);
                if (subtask) {
                    subtask.completed = !subtask.completed;
                    this.save();
                    this.render();
                }
            }

            deleteSubtask(parentId, subtaskId) {
                const parentTask = this.todos.find(t => t.id === parentId);
                parentTask.subtasks = parentTask.subtasks.filter(s => s.id !== subtaskId);
                this.save();
                this.render();
            }

            setFilter(filter) {
                this.filter = filter;
                this.render();
            }

            save() {
                localStorage.setItem('todos', JSON.stringify(this.todos));
            }

            render() {
                const filteredTodos = this.todos.filter(todo => {
                    if (this.filter === 'all') return true;
                    if (this.filter === 'active') return !todo.completed;
                    if (this.filter === 'completed') return todo.completed;
                });

                if (filteredTodos.length === 0) {
                    this.todoList.innerHTML = '<div class="empty-state">No tasks yet. Add one above!</div>';
                    return;
                }

                this.todoList.innerHTML = filteredTodos.map(todo => `
                    <div class="todo-item ${todo.completed ? 'completed' : ''}">
                        <div class="todo-header" onclick="todoApp.toggleSubtaskVisibility(${todo.id})">
                            <div class="checkbox ${todo.completed ? 'checked' : ''}" 
                                 onclick="todoApp.toggleTodo(${todo.id})"></div>
                            <span class="todo-text">${todo.text}</span>
                            <button class="add-subtask-btn" onclick="todoApp.addSubtask(${todo.id})">Add Subtask</button>
                            <button class="delete-btn" onclick="todoApp.deleteTodo(${todo.id})">Delete</button>
                        </div>
                        <div class="subtasks" style="display: ${todo.showSubtasks ? 'block' : 'none'};">
                            ${todo.subtasks.map(subtask => `
                                <div class="subtask-item ${subtask.completed ? 'completed' : ''}">
                                    <div class="checkbox ${subtask.completed ? 'checked' : ''}" 
                                         onclick="todoApp.toggleSubtask(${todo.id}, ${subtask.id})"></div>
                                    <span class="todo-text">${subtask.text}</span>
                                    <button class="delete-btn" onclick="todoApp.deleteSubtask(${todo.id}, ${subtask.id})">Delete</button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="subtask-input" id="subtaskInput-${todo.id}" style="display: ${todo.showSubtasks ? 'flex' : 'none'};">
                            <input type="text" placeholder="Add a subtask...">
                            <button onclick="todoApp.addSubtask(${todo.id})">Add</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        const todoApp = new TodoApp();
    </script>
</body>
  
</html>
