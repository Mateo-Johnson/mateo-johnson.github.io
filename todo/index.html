<!DOCTYPE html>
<html lang="en">
<head>
  
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Todo List | Mateo Johnson</title>
    <style>
        :root {
            --highlight: #0e7be2;
            --bg-dark: #1a1a1a;
            --bg-lighter: #252525;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 700;
            background: linear-gradient(135deg, var(--highlight), #64b5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input, button {
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
        }

        input {
            flex: 1;
            background: var(--bg-lighter);
            color: var(--text);
            transition: all 0.3s ease;
        }

        input:focus {
            outline: 2px solid var(--highlight);
            box-shadow: 0 0 15px rgba(14, 123, 226, 0.3);
        }

        button {
            background: var(--highlight);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(14, 123, 226, 0.4);
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .filter-btn {
            background: transparent;
            border: 2px solid var(--highlight);
            opacity: 0.6;
        }

        .filter-btn.active {
            background: var(--highlight);
            opacity: 1;
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .todo-item {
            background: var(--bg-lighter);
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideIn 0.3s ease;
            transition: all 0.3s ease;
        }

        .todo-item:hover {
            transform: translateX(5px);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--highlight);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .checkbox.checked {
            background: var(--highlight);
        }

        .checkbox.checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
        }

        .todo-text {
            flex: 1;
        }

        .delete-btn {
            background: transparent;
            color: #ff4444;
            border: 2px solid #ff4444;
            padding: 0.5rem 1rem;
        }

        .delete-btn:hover {
            background: #ff4444;
            color: white;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .input-container {
                flex-direction: column;
            }

            .filters {
                flex-wrap: wrap;
            }

            .filter-btn {
                flex: 1;
                min-width: 100px;
            }
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #666;
            font-style: italic;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-lighter);
            border-radius: 3px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--highlight);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>
        
        <div class="input-container">
            <input type="text" id="todoInput" placeholder="Add a new task..." autofocus>
            <button id="addBtn">Add Task</button>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" style="width: 0%"></div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="todo-list" id="todoList">
            <div class="empty-state">No tasks yet. Add one above!</div>
        </div>
    </div>

    <script>
        class TodoApp {
            constructor() {
                this.todos = JSON.parse(localStorage.getItem('todos')) || [];
                this.currentFilter = 'all';
                this.setupElements();
                this.setupEventListeners();
                this.render();
            }

            setupElements() {
                this.todoInput = document.getElementById('todoInput');
                this.addBtn = document.getElementById('addBtn');
                this.todoList = document.getElementById('todoList');
                this.filterBtns = document.querySelectorAll('.filter-btn');
                this.progressFill = document.querySelector('.progress-fill');
            }

            setupEventListeners() {
                this.addBtn.addEventListener('click', () => this.addTodo());
                this.todoInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTodo();
                });

                this.filterBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.currentFilter = btn.dataset.filter;
                        this.filterBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.render();
                    });
                });
            }

            addTodo() {
                const text = this.todoInput.value.trim();
                if (text) {
                    this.todos.unshift({
                        id: Date.now(),
                        text,
                        completed: false
                    });
                    this.todoInput.value = '';
                    this.save();
                    this.render();
                }
            }

            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    this.save();
                    this.render();
                }
            }

            deleteTodo(id) {
                this.todos = this.todos.filter(t => t.id !== id);
                this.save();
                this.render();
            }

            save() {
                localStorage.setItem('todos', JSON.stringify(this.todos));
            }

            updateProgress() {
                if (this.todos.length === 0) {
                    this.progressFill.style.width = '0%';
                    return;
                }
                const completed = this.todos.filter(t => t.completed).length;
                const percentage = (completed / this.todos.length) * 100;
                this.progressFill.style.width = `${percentage}%`;
            }

            render() {
                let filteredTodos = this.todos;
                if (this.currentFilter === 'active') {
                    filteredTodos = this.todos.filter(t => !t.completed);
                } else if (this.currentFilter === 'completed') {
                    filteredTodos = this.todos.filter(t => t.completed);
                }

                if (filteredTodos.length === 0) {
                    this.todoList.innerHTML = '<div class="empty-state">No tasks found</div>';
                } else {
                    this.todoList.innerHTML = filteredTodos.map(todo => `
                        <div class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                            <div class="checkbox ${todo.completed ? 'checked' : ''}" 
                                 onclick="todoApp.toggleTodo(${todo.id})"></div>
                            <span class="todo-text">${todo.text}</span>
                            <button class="delete-btn" onclick="todoApp.deleteTodo(${todo.id})">Delete</button>
                        </div>
                    `).join('');
                }

                this.updateProgress();
            }
        }

        const todoApp = new TodoApp();
    </script>
</body>
</html>
