<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Mateo Johnson</title>

    <!-- Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

<style>
/* ================= RESET ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #FFFEF7, #FFF8E1, #FFFEF7);
    color: #2C2C2C;
    line-height: 1.6;
    overflow-x: hidden;
}

/* ================= HEADER ================= */
header {
    position: sticky;
    top: 0;
    z-index: 1000;
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(212,175,55,0.15);
    transition: all 0.3s ease;
}

header.scrolled {
    padding: 16px 32px;
    box-shadow: 0 10px 40px rgba(212,175,55,0.15);
}

.logo-img {
    max-width: 60px;
    height: auto;
}

nav {
    display: flex;
    gap: 1.5rem;
}

nav a {
    padding: 10px 18px;
    border-radius: 25px;
    font-weight: 600;
    font-size: 0.9rem;
    text-transform: uppercase;
    color: #555;
    text-decoration: none;
    transition: all 0.3s ease;
}

nav a.active,
nav a:hover {
    color: #D4AF37;
    background: rgba(212,175,55,0.12);
}

/* ================= MAIN ================= */
main {
    max-width: 1200px;
    margin: auto;
    padding: 160px 20px 80px;
}

main h1,
.section-header {
    text-align: center;
    font-weight: 300;
    background: linear-gradient(135deg, #333, #555, #D4AF37);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 60px;
}

main h1 { font-size: 3.5rem; }
.section-header { font-size: 3rem; margin-top: 100px; }

/* ================= GRIDS ================= */
.projects-grid,
.coding-projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 32px;
}

/* ================= CARDS ================= */
.project-card,
.coding-card {
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
    max-height: 340px;
}

.project-card.expanded,
.coding-card.expanded {
    max-height: 2200px;
}

/* ================= MEDIA (NO CROPPING) ================= */
.project-image,
.project-cover-iframe,
.coding-cover-iframe {
    width: 100%;
    aspect-ratio: 16 / 9;
    height: auto;
    object-fit: contain;
    background: #f8f8f8;
    border: none;
}

/* ================= CONTENT ================= */
.project-content,
.coding-card-content {
    padding: 20px;
}

.project-title,
.coding-card-title {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #FFD700, #D4AF37);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.project-description,
.project-tags,
.project-code,
.view-btn,
.coding-card-description,
.coding-card-tags,
.coding-demo-iframe,
.coding-view-btn {
    opacity: 0;
    max-height: 0;
    transition: opacity 0.4s ease, max-height 0.4s ease;
}

.project-card.expanded .project-description,
.project-card.expanded .project-tags,
.project-card.expanded .project-code,
.project-card.expanded .view-btn,
.coding-card.expanded .coding-card-description,
.coding-card.expanded .coding-card-tags,
.coding-card.expanded .coding-demo-iframe,
.coding-card.expanded .coding-view-btn {
    opacity: 1;
    max-height: 1000px;
    margin-top: 10px;
}

/* ================= TAGS ================= */
.project-tags span,
.coding-card-tags span {
    display: inline-block;
    padding: 6px 14px;
    margin: 6px 6px 0 0;
    border-radius: 20px;
    font-size: 0.8rem;
    background: rgba(212,175,55,0.15);
    color: #D4AF37;
}

/* ================= CODE ================= */
.project-code {
    background: #f9f9f9;
    border-left: 4px solid #D4AF37;
    padding: 14px;
    border-radius: 10px;
    overflow-x: auto;
    font-family: monospace;
}

/* ================= BUTTONS ================= */
.view-btn,
.coding-view-btn {
    display: inline-block;
    margin-top: 16px;
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: 600;
    background: linear-gradient(135deg, #FFD700, #D4AF37);
    color: white;
    text-decoration: none;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {
    header {
        flex-direction: column;
        gap: 1rem;
    }

    main {
        padding: 130px 16px 60px;
    }

    main h1 { font-size: 2.3rem; }
    .section-header { font-size: 2rem; }

    .project-card:hover,
    .coding-card:hover {
        transform: none;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
}
</style>
</head>

<body>

<header id="header">
    <a href="/">
        <img src="https://mateo-johnson.github.io/resources/logo3.png" class="logo-img" alt="Logo">
    </a>
    <nav>
        <a href="/skills">Skills</a>
        <a class="active">Projects</a>
        <a href="/contact">Contact</a>
    </nav>
</header>

<main>
    <h1>My Projects</h1>
    <div class="projects-grid" id="projectsGrid"></div>

    <h2 class="section-header">Web Design Demos</h2>
    <div class="coding-projects-grid" id="codingProjectsGrid"></div>
</main>

<footer style="text-align:center;padding:60px 20px;background:#2C2C2C;color:#fff;">
    © 2025 Mateo Johnson. All Rights Reserved.
</footer>

<script>
/* HEADER SCROLL */
window.addEventListener('scroll', () => {
    document.getElementById('header')
        .classList.toggle('scrolled', window.scrollY > 50);
});

/* ESCAPE HTML */
function escapeHTML(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ================= CODING PROJECTS ================= */
fetch('coding-projects.json')
.then(res => res.json())
.then(projects => {
    const grid = document.getElementById('codingProjectsGrid');

    projects.forEach(proj => {
        const card = document.createElement('div');
        card.className = 'coding-card';

        if (proj.demoUrl) {
            const cover = document.createElement('iframe');
            cover.src = proj.demoUrl;
            cover.className = 'coding-cover-iframe';
            cover.setAttribute('loading','lazy');
            card.appendChild(cover);
        }

        const content = document.createElement('div');
        content.className = 'coding-card-content';

        content.innerHTML = `
            <h3 class="coding-card-title">${proj.title}</h3>
            <p class="coding-card-description">${proj.description}</p>
            <div class="coding-card-tags">${proj.tags.map(t=>`<span>${t}</span>`).join('')}</div>
        `;

        let iframe;
        if (proj.demoUrl) {
            iframe = document.createElement('iframe');
            iframe.className = 'coding-demo-iframe';
            iframe.dataset.src = proj.demoUrl;
            iframe.setAttribute('loading','lazy');
            content.appendChild(iframe);
        }

        const btn = document.createElement('a');
        btn.href = proj.link || proj.demoUrl;
        btn.target = '_blank';
        btn.className = 'coding-view-btn';
        btn.textContent = 'View Demo';
        content.appendChild(btn);

        card.appendChild(content);

        card.addEventListener('click', e => {
            if (e.target.tagName === 'A' || e.target.tagName === 'IFRAME') return;
            card.classList.toggle('expanded');
            if (iframe && !iframe.src) iframe.src = iframe.dataset.src;
        });

        grid.appendChild(card);
    });
});

/* ================= REGULAR PROJECTS ================= */
fetch('projects.json')
.then(res => res.json())
.then(projects => {
    const grid = document.getElementById('projectsGrid');

    projects.forEach(proj => {
        const card = document.createElement('div');
        card.className = 'project-card';

        const content = document.createElement('div');
        content.className = 'project-content';

        content.innerHTML = `
            <img src="${proj.image}" class="project-image" alt="${proj.title}">
            <h3 class="project-title">${proj.title}</h3>
            <p class="project-description">${proj.description}</p>
            <div class="project-tags">${proj.tags.map(t=>`<span>${t}</span>`).join('')}</div>
        `;

        if (proj.code) {
            proj.code.forEach(c => {
                const pre = document.createElement('pre');
                pre.className = 'project-code';
                pre.innerHTML = `<code>${escapeHTML(c.snippet)}</code>`;
                content.appendChild(pre);
            });
        }

        const btn = document.createElement('a');
        btn.href = proj.link;
        btn.className = 'view-btn';
        btn.textContent = 'View Project';
        content.appendChild(btn);

        card.appendChild(content);

        card.addEventListener('click', e => {
            if (e.target.tagName === 'A') return;
            card.classList.toggle('expanded');
        });

        grid.appendChild(card);
    });
});
</script>

</body>
</html>
